<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WHAT_ET 후원</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23242424' d='M32 4l7.9 17 18.6 2.3-13.7 12.8 3.6 18.4L32 45.4 15.6 54.5l3.6-18.4L5.5 23.3 24.1 21z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../support.css?v=support-qr1">
</head>
<body>
  <main class="support-shell">
    <nav class="support-nav" aria-label="페이지 이동">
      <a class="brand-link" href="../"><span class="brand-mark">★</span><span>WHAT_ET</span></a>
      <div class="nav-links">
        <a href="../">외관표</a>
        <a href="../settings/">설정 노트</a>
        <a href="../admin/support/">관리</a>
      </div>
    </nav>

    <section class="support-card">
      <p class="eyebrow">SUPPORT WHAT_ET</p>
      <h1 data-support="title">WHAT_ET 후원</h1>
      <p class="lead" data-support="message">WHAT_ET를 유용하게 쓰고 있다면 작은 응원이 제작과 유지보수에 큰 힘이 됩니다.</p>
      <figure class="qr-card">
        <img src="../assets/support-qr.png" alt="후원 계좌 QR 코드">
        <figcaption data-support="qrCaption">⚡ 호랑이 밥 주기🐯</figcaption>
      </figure>
      <div class="support-actions" id="supportActions"></div>
      <div class="info-grid">
        <div class="info-box">
          <small>사용처</small>
          <p data-support="usage">호스팅 유지, 기능 개선, 폰트와 레이아웃 테스트</p>
        </div>
        <div class="info-box">
          <small>안내</small>
          <p data-support="notice">후원은 선택 사항이며, 사이트 기능은 계속 무료로 사용할 수 있습니다.</p>
        </div>
        <div class="info-box">
          <small>문의</small>
          <p data-support="contact">관리 페이지에서 연락처나 후원 링크를 설정할 수 있습니다.</p>
        </div>
      </div>
    </section>
  </main>
  <script src="../support.js?v=support-qr1"></script>
</body>
</html>
