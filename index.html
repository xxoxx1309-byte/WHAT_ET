<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WHAT_ET</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%235d5696' d='M32 4l7.9 17 18.6 2.3-13.7 12.8 3.6 18.4L32 45.4 15.6 54.5l3.6-18.4L5.5 23.3 24.1 21z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=main-layout1">
</head>
<body>
  <main class="app">
    <aside class="panel">
      <header class="brand">
        <div class="brand-title">
          <div class="logo-star" aria-hidden="true">★</div>
          <div>
            <p class="eyebrow">CHARACTER SHEET MAKER</p>
            <h1>WHAT_ET</h1>
          </div>
        </div>
        <div class="brand-actions">
          <a class="nav-button" href="settings/">설정 노트</a>
          <a class="nav-button" href="support/">후원</a>
          <button id="exportPng" class="primary">PNG 저장</button>
        </div>
      </header>

      <section class="group">
        <h2>작업 저장</h2>
        <div class="button-row save-actions">
          <button id="saveCharacter" class="primary" type="button">현재 저장</button>
          <button id="newCharacter" type="button">새 작업</button>
        </div>
        <p id="saveStatus" class="subcopy" aria-live="polite"></p>
        <div id="saveList" class="save-list"></div>
      </section>

      <section class="group">
        <h2>기본 정보</h2>
        <label>이름<input id="name" type="text" placeholder="캐릭터 이름" lang="ko" autocomplete="off" spellcheck="false"></label>
        <div class="two">
          <label>나이<input id="age" type="text" placeholder="나이" lang="ko" autocomplete="off" spellcheck="false"></label>
          <label>키<input id="height" type="text" placeholder="키" lang="ko" autocomplete="off" spellcheck="false"></label>
        </div>
        <label>성별<input id="gender" type="text" placeholder="성별" lang="ko" autocomplete="off" spellcheck="false"></label>
        <label>키워드<input id="keywords" type="text" placeholder="키워드" lang="ko" autocomplete="off" spellcheck="false"></label>
        <label>출처<input id="credit" type="text" placeholder="@출처" lang="ko" autocomplete="off" spellcheck="false"></label>
      </section>

      <section class="group">
        <h2>외관 설명</h2>
        <label>헤어 & 얼굴
          <textarea id="summary" rows="4" placeholder="머리색, 눈색, 표정, 인상 등을 적어주세요." lang="ko" autocomplete="off" spellcheck="false"></textarea>
        </label>
        <label>의상 & 기타
          <textarea id="memo" rows="4" placeholder="의상, 소품, 분위기 등을 적어주세요." lang="ko" autocomplete="off" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="group">
        <h2>이미지</h2>
        <div id="slotList" class="slot-list"></div>
        <div class="adjust">
          <p id="selectedName">선택된 이미지: 메인 전신</p>
          <label>확대 <input id="zoom" type="range" min="0.2" max="3" step="0.01" value="1"></label>
          <div class="two">
            <label>X <input id="offsetX" type="range" min="-600" max="600" step="1" value="0"></label>
            <label>Y <input id="offsetY" type="range" min="-600" max="600" step="1" value="0"></label>
          </div>
          <div class="button-row">
            <button id="fitImage">맞춤</button>
            <button id="fillImage">채우기</button>
            <button id="clearImage">삭제</button>
          </div>
        </div>
      </section>

      <section class="group">
        <h2>스티커 이미지</h2>
        <button id="addSticker" class="primary" type="button">스티커 추가</button>
        <div id="stickerList" class="sticker-list"></div>
        <div class="adjust">
          <p id="selectedStickerName">선택된 스티커: 없음</p>
          <label>크기 <input id="stickerSize" type="range" min="40" max="520" step="1" value="180"></label>
          <div class="two">
            <label>X <input id="stickerX" type="range" min="0" max="1600" step="1" value="1180"></label>
            <label>Y <input id="stickerY" type="range" min="0" max="1200" step="1" value="900"></label>
          </div>
          <button id="deleteSticker" type="button">스티커 삭제</button>
        </div>
      </section>

      <section class="group">
        <h2>컬러</h2>
        <p class="subcopy">테마 컬러는 시트 톤에 적용되고, 나머지는 캐릭터 팔레트로 표시됩니다.</p>
        <div class="swatches" id="swatches"></div>
        <button id="addColor" type="button">색 추가</button>
      </section>
    </aside>

    <section class="workspace">
      <div class="toolbar">
        <strong>WHAT_ET SHEET</strong>
      </div>
      <div class="stage-wrap">
        <canvas id="sheet" width="1600" height="1200" aria-label="외관표 미리보기"></canvas>
        <input id="imagePicker" type="file" accept="image/*" hidden>
        <input id="stickerPicker" type="file" accept="image/*" hidden>
      </div>
    </section>
  </main>
  <script src="app.js?v=main-layout1"></script>
</body>
</html>
