<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WHAT_ET 설정 노트</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2387a9ad' d='M32 4l7.9 17 18.6 2.3-13.7 12.8 3.6 18.4L32 45.4 15.6 54.5l3.6-18.4L5.5 23.3 24.1 21z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="settings.css?v=direct-edit1">
</head>
<body>
  <main class="note-app">
    <aside class="editor">
      <header class="editor-head">
        <div class="editor-brand">
          <span class="brand-mark" aria-hidden="true">★</span>
          <div>
            <p class="eyebrow">WHAT_ET</p>
            <h1>설정 노트</h1>
          </div>
        </div>
        <nav class="page-tabs" aria-label="페이지 이동">
          <a class="active" href="settings.html">설정 노트</a>
          <a href="index.html">외관표 시트</a>
        </nav>
      </header>

      <section class="panel-block">
        <h2>문서</h2>
        <label>캐릭터 이름<input id="characterName" type="text" placeholder="이름" autocomplete="off"></label>
        <label>영문/별칭<input id="characterAlias" type="text" placeholder="alias" autocomplete="off"></label>
        <label>한 줄 문장<input id="tagline" type="text" placeholder="캐릭터를 관통하는 문장" autocomplete="off"></label>
        <div class="theme-presets" id="themePresets"></div>
        <div class="color-grid">
          <label>포인트<input id="accentColor" type="color" value="#87a9ad"></label>
          <label>종이<input id="paperColor" type="color" value="#ffffff"></label>
          <label>글자<input id="textColor" type="color" value="#33434a"></label>
        </div>
        <div class="writing-tools">
          <button id="focusMode" type="button">집중 모드</button>
          <button id="undoAction" type="button" disabled>되돌리기</button>
        </div>
        <div class="stats-row">
          <span id="charCount">0자</span>
          <span id="sectionCount">0섹션</span>
          <span id="savedState">대기 중</span>
        </div>
      </section>

      <section class="panel-block">
        <h2>서식</h2>
        <label>기본 폰트
          <select id="fontFamily">
            <option value="Pretendard">프리텐다드</option>
            <option value="SUIT">SUIT</option>
            <option value="KoPub Dotum">KoPub 돋움</option>
            <option value="KoPub Batang">KoPub 바탕</option>
            <option value="Gmarket Sans">G마켓 산스</option>
            <option value="Chosunilbo_myungjo">조선일보명조</option>
            <option value="MaruBuri">마루 부리</option>
            <option value="BookkMyungjo">부크크 명조</option>
            <option value="GimpoPeaceFoundation">김포평화바탕</option>
            <option value="OngleipParkDahyeon">온글잎 박다현체</option>
            <option value="IsYun">이서윤체</option>
            <option value="HeirofLight">빛의계승자체</option>
            <option value="DnfTemperedBlade">던파 연단된 칼날</option>
            <option value="DungeonFighterOnlineBeatBeat">던파 비트비트체</option>
          </select>
        </label>
        <label>본문 폭
          <input id="paperWidth" type="range" min="620" max="980" step="10" value="860">
        </label>
        <label>본문 크기
          <input id="bodySize" type="range" min="13" max="19" step="1" value="15">
        </label>
        <label>줄 간격
          <input id="lineHeight" type="range" min="1.45" max="2.2" step="0.05" value="1.88">
        </label>
      </section>

      <section class="panel-block">
        <h2>메모</h2>
        <textarea id="scratchNote" class="scratch" placeholder="문서에 넣기 전 떠오른 설정, 대사, 떡밥을 적어두세요."></textarea>
      </section>

      <section class="panel-block">
        <h2>양식 추가</h2>
        <div id="templateCards" class="template-cards"></div>
      </section>

      <section class="panel-block">
        <div class="block-title">
          <h2>기본 항목</h2>
          <button id="addMeta" type="button">항목 추가</button>
        </div>
        <div id="metaEditor" class="stack"></div>
      </section>

      <section class="panel-block">
        <div class="block-title">
          <h2>본문 섹션</h2>
          <button id="addSection" type="button">섹션 추가</button>
        </div>
        <div id="sectionEditor" class="stack"></div>
      </section>

      <section class="panel-block">
        <div class="button-grid">
          <button id="saveNote" class="primary" type="button">저장</button>
          <button id="newNote" type="button">새 문서</button>
        </div>
        <p id="saveStatus" class="hint" aria-live="polite"></p>
      </section>
    </aside>

    <section class="preview-wrap">
      <div class="preview-toolbar">
        <strong>WHAT_ET NOTE</strong>
        <div class="export-actions">
          <button id="exitFocus" class="focus-exit" type="button">편집으로 돌아가기</button>
          <span id="previewStats">0자</span>
          <button id="shareNote" type="button">공유</button>
          <button id="exportPng" type="button">PNG</button>
          <button id="exportPdf" type="button">PDF</button>
        </div>
      </div>
      <article id="notePreview" class="note-paper"></article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="settings.js?v=direct-edit1"></script>
</body>
</html>
